name: Publish to firefox Web Store

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build extension (Quasar BEX)
        run: npx quasar build -m bex -T firefox

      - name: Validate build output
        run: |
          if [ ! -d "dist/bex-firefox" ]; then
            echo "Error: Build output directory dist/bex-firefox not found!"
            exit 1
          fi
          if [ ! -f "dist/bex-firefox/manifest.json" ]; then
            echo "Error: manifest.json not found in build output!"
            exit 1
          fi
          echo "Build output validated successfully"

      - name: Package zip
        id: package
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=$(node -p "require('./package.json').version")-$(git rev-parse --short HEAD)
          fi
          ZIP_NAME="diogel-firefox-${TAG}.zip"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          cd dist/bex-firefox
          zip -r "../../$ZIP_NAME" .
          cd ../..
          cp "$ZIP_NAME" diogel.zip
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.package.outputs.tag }}"
          zip_name="${{ steps.package.outputs.zip_name }}"
          echo "Uploading $zip_name to release $tag"
          if [ ! -f "$zip_name" ]; then
            echo "Error: $zip_name not found!"
            exit 1
          fi
          
          gh release create "$tag" \
            "$zip_name" \
            --title="$tag" \
            --generate-notes || \
          gh release upload "$tag" \
            "$zip_name" \
            --clobber
      - name: Publish to AMO (Firefox Add-ons)
        uses: browser-actions/release-firefox-addon@v0.2.1
        with:
          addon-id: ${{ secrets.AMO_ADDON_ID }}
          addon-path: ${{ steps.package.outputs.zip_name }}
          auth-api-issuer: ${{ secrets.AMO_API_ISSUE }}
          auth-api-secret: ${{ secrets.AMO_API_SECRET }}
          channel: listed


     
