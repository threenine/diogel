name: Publish to Chrome Web Store

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build extension (Quasar BEX)
        run: npx quasar build -m bex -T chrome

      - name: Validate build output
        run: |
          if [ ! -d "dist/bex-chrome" ]; then
            echo "Error: Build output directory dist/bex-chrome not found!"
            exit 1
          fi
          if [ ! -f "dist/bex-chrome/manifest.json" ]; then
            echo "Error: manifest.json not found in build output!"
            exit 1
          fi
          echo "Build output validated successfully"

      - name: Package zip
        id: package
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=$(node -p "require('./package.json').version")-$(git rev-parse --short HEAD)
          fi
          ZIP_NAME="diogel-chrome-${TAG}.zip"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          cd dist/bex-chrome
          zip -r "../../$ZIP_NAME" .
          cd ../..
          cp "$ZIP_NAME" diogel.zip

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.package.outputs.tag }}"
          zip_name="${{ steps.package.outputs.zip_name }}"
          echo "Uploading $zip_name to release $tag"
          if [ ! -f "$zip_name" ]; then
            echo "Error: $zip_name not found!"
            exit 1
          fi
          
          # Try to create the release. If it exists, upload to it.
          gh release create "$tag" \
            "$zip_name" \
            --title="$tag" \
            --generate-notes || \
          gh release upload "$tag" \
            "$zip_name" \
            --clobber

      - name: Upload & Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: diogel.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
